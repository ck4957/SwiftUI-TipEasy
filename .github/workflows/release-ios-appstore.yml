name: Release iOS to App Store Connect

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Optional build number to set before upload"
        required: false
        type: string

jobs:
  release:
    name: Build and upload
    runs-on: macos-26
    timeout-minutes: 60

    env:
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
      ASC_APPLE_ID: ${{ secrets.ASC_APPLE_ID }}
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '64FN52KV6J' }}
      WORKSPACE: Scan Tip.xcworkspace
      SCHEME: Scan Tip
      CONFIGURATION: Release
      SDK: iphoneos
      DESTINATION: generic/platform=iOS
      ASC_API_KEY_PATH: ${{ github.workspace }}/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8
      ASC_API_KEY_SUBJECT: user
      API_PRIVATE_KEYS_DIR: ${{ github.workspace }}/private_keys
      HAS_APPSTORE_PROVISIONING_PROFILE: ${{ secrets.APPSTORE_PROVISIONING_PROFILE_BASE64 != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Print runner and Xcode metadata
        run: |
          set -euo pipefail
          sw_vers
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -euo pipefail
          mkdir -p private_keys
          printf '%s\n' "$ASC_API_KEY_P8" | perl -pe 's/\\n/\n/g' > "$ASC_API_KEY_PATH"
          chmod 600 "$ASC_API_KEY_PATH"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$ASC_API_KEY_PATH" "$HOME/.appstoreconnect/private_keys/$(basename "$ASC_API_KEY_PATH")"
          chmod 600 "$HOME/.appstoreconnect/private_keys/$(basename "$ASC_API_KEY_PATH")"
          grep -q -- '-----BEGIN PRIVATE KEY-----' "$ASC_API_KEY_PATH"
          grep -q -- '-----END PRIVATE KEY-----' "$ASC_API_KEY_PATH"

      - name: Verify App Store Connect API authentication
        run: |
          set -euo pipefail
          xcrun altool --list-apps \
            --api-key "$ASC_API_KEY_ID" \
            --api-issuer "$ASC_API_ISSUER_ID" \
            --api-key-subject "$ASC_API_KEY_SUBJECT" \
            --p8-file-path "$ASC_API_KEY_PATH" >/dev/null

      - name: Install signing certificate
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_CER_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_CER_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          certificate_der_path="$RUNNER_TEMP/apple-distribution.cer"
          certificate_path="$RUNNER_TEMP/apple-distribution.p12"
          printf '%s' "$APPLE_DISTRIBUTION_CERTIFICATE_CER_BASE64" | base64 -D > "$certificate_der_path"
          printf '%s' "$APPLE_DISTRIBUTION_CERTIFICATE_P12_BASE64" | base64 -D > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_der_path" -A -t cert -f x509 -k "$keychain_path"
          security import "$certificate_path" -P "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"
          identity=$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/.*"\(Apple Distribution:[^"]*\)".*/\1/p' | head -n 1)
          if [[ -z "$identity" ]]; then
            echo "No Apple Distribution signing identity with private key was found in the CI keychain." >&2
            exit 1
          fi
          echo "SIGNING_CERTIFICATE=$identity" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        if: ${{ env.HAS_APPSTORE_PROVISIONING_PROFILE == 'true' }}
        env:
          APPSTORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPSTORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          profile_path="$RUNNER_TEMP/appstore.mobileprovision"
          profile_plist="$RUNNER_TEMP/appstore-profile.plist"
          printf '%s' "$APPSTORE_PROVISIONING_PROFILE_BASE64" | base64 -D > "$profile_path"
          security cms -D -i "$profile_path" > "$profile_plist"
          uuid=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_plist")
          name=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_plist")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.mobileprovision"
          {
            echo "CODE_SIGN_STYLE=Manual"
            echo "PROVISIONING_PROFILE_SPECIFIER=$name"
          } >> "$GITHUB_ENV"

      - name: Set requested build number
        if: ${{ inputs.build_number != '' }}
        run: ./scripts/bump-build-number.sh "${{ inputs.build_number }}"

      - name: Print resolved build settings
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk "$SDK" \
            -destination "$DESTINATION" \
            -showBuildSettings | grep -E '^[[:space:]]+(CURRENT_PROJECT_VERSION|MARKETING_VERSION|PLATFORM_NAME|PLATFORM_DISPLAY_NAME|SDKROOT|SDK_NAME|SDK_VERSION|SDK_PRODUCT_BUILD_VERSION|PLATFORM_PRODUCT_BUILD_VERSION|XCODE_PRODUCT_BUILD_VERSION|XCODE_VERSION_ACTUAL|DEVELOPER_DIR|SUPPORTED_PLATFORMS|IPHONEOS_DEPLOYMENT_TARGET) ='

      - name: Run release doctor
        run: ./scripts/release-doctor.sh

      - name: Archive, export, validate, and upload
        run: ./scripts/release-upload.sh

      - name: Print archive metadata
        if: always()
        run: |
          set -euo pipefail
          app_info="build/ScanTip.xcarchive/Products/Applications/Scan Tip.app/Info.plist"
          if [[ -f "$app_info" ]]; then
            /usr/libexec/PlistBuddy \
              -c 'Print :BuildMachineOSBuild' \
              -c 'Print :DTXcode' \
              -c 'Print :DTXcodeBuild' \
              -c 'Print :DTPlatformName' \
              -c 'Print :DTPlatformVersion' \
              -c 'Print :DTPlatformBuild' \
              -c 'Print :DTSDKName' \
              -c 'Print :DTSDKBuild' \
              -c 'Print :CFBundleVersion' \
              -c 'Print :CFBundleShortVersionString' \
              "$app_info"
          fi
