name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-gate:
    name: Release Gate
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install CocoaPods dependencies
        run: pod install

      - name: Run release doctor
        run: ./scripts/release-doctor.sh

      - name: Build without signing
        run: |
          xcodebuild \
            -workspace "Scan Tip.xcworkspace" \
            -scheme "Scan Tip" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build
